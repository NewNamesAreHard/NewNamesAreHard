name: GitHub Profile Summary Cards

on:
    schedule:
        - cron: "0 0 * * *"
    workflow_dispatch:

jobs:
    build:
        runs-on: ubuntu-latest
        permissions:
            contents: write

        steps:
            - uses: actions/checkout@v4

            - uses: vn7n24fzkq/github-profile-summary-cards@release
              env:
                  GITHUB_TOKEN: ${{ secrets.SUMMARY_GITHUB_TOKEN }}
              with:
                  USERNAME: ${{ github.repository_owner }}
                  BRANCH_NAME: "main"
                  UTC_OFFSET: 2
                  AUTO_PUSH: false

            - name: Keep only profile details SVG
              run: |
                  mkdir -p /tmp/profile-summary-card-output
                  cp profile-summary-card-output/github/0-profile-details.svg /tmp/profile-summary-card-output/0-profile-details.svg
                  rm -rf profile-summary-card-output
                  mkdir -p profile-summary-card-output/github
                  mv /tmp/profile-summary-card-output/0-profile-details.svg profile-summary-card-output/github/0-profile-details.svg
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  git add -A profile-summary-card-output
                  if ! git diff --cached --quiet; then
                      git commit -m "Generate profile summary cards"
                      git push
                  fi
